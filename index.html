        function carregarSecretarias() {
            const prefeituraSel = document.getElementById('prefeitura').value;
            const secretariaSelect = document.getElementById('secretaria');
            const resultado = document.getElementById('resultado');
            
            secretariaSelect.innerHTML = '<option value="">-- Selecione uma secretaria --</option>';
            resultado.classList.remove('show');
            
            if (prefeituraSel) {
                secretariaSelect.disabled = false;
                const secretarias = dados[prefeituraSel].secretarias;
                
                for (let key in secretarias) {
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = secretarias[key].nome;
                    secretariaSelect.appendChild(option);
                }
            } else {
                secretariaSelect.disabled = true;
            }
        }

        function formatarTelefone(telefone) {
            return `<a href="tel:${telefone.replace(/[^0-9]/g, '')}">${telefone}</a>`;
        }

        function formatarEmail(email) {
            return `<a href="mailto:${email}">${email}</a>`;
        }

        function exibirSecretario() {
            const prefeituraSel = document.getElementById('prefeitura').value;
            const secretariaSel = document.getElementById('secretaria').value;
            const resultado = document.getElementById('resultado');
            
            if (prefeituraSel && secretariaSel) {
                const info = dados[prefeituraSel].secretarias[secretariaSel];
                
                let html = `
                    <h3>${info.nome}</h3>
                    <div class="info-item">
                        <span class="info-label">Nome:</span>
                        <span class="info-value">${info.secretario}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Cargo:</span>
                        <span class="info-value">${info.cargo}</span>
                    </div>
                `;

                if (info.endereco) {
                    html += `
                        <div class="info-item">
                            <span class="info-label">Endereço:</span>
                            <span class="info-value">${info.endereco}</span>
                        </div>
                    `;
                }

                if (info.email) {
                    html += `
                        <div class="info-item">
                            <span class="info-label">E-mail:</span>
                            <span class="info-value">${formatarEmail(info.email)}</span>
                        </div>
                    `;
                }

                if (info.contato) {
                    html += `
                        <div class="info-item">
                            <span class="info-label">Contato:</span>
                            <span class="info-value">${formatarTelefone(info.contato)}</span>
                        </div>
                    `;
                }
                
                if (info.complementar) {
                    html += `
                        <div class="complementar">
                            <h4>👤 Informações Complementares</h4>
                            <div class="info-item">
                                <span class="info-label">Nome:</span>
                                <span class="info-value">${info.complementar.nome}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Cargo:</span>
                                <span class="info-value">${info.complementar.cargo}</span>
                            </div>
                    `;

                    if (info.complementar.endereco) {
                        html += `
                            <div class="info-item">
                                <span class="info-label">Endereço:</span>
                                <span class="info-value">${info.complementar.endereco}</span>
                            </div>
                        `;
                    }

                    if (info.complementar.email) {
                        html += `
                            <div class="info-item">
                                <span class="info-label">E-mail:</span>
                                <span class="info-value">${formatarEmail(info.complementar.email)}</span>
                            </div>
                        `;
                    }

                    if (info.complementar.contato) {
                        html += `
                            <div class="info-item">
                                <span class="info-label">Contato:</span>
                                <span class="info-value">${formatarTelefone(info.complementar.contato)}</span>
                            </div>
                        `;
                    }

                    html += `</div>`;
                }

                if (info.complementar2) {
                    html += `
                        <div class="complementar">
                            <h4>👤 Informações Adicionais</h4>
                            <div class="info-item">
                                <span class="info-label">Nome:</span>
                                <span class="info-value">${info.complementar2.nome}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Cargo:</span>
                                <span class="info-value">${info.complementar2.cargo}</span>
                            </div>
                        </div>
                    `;
                }
                
                resultado.innerHTML = html;
                resultado.classList.add('show');
                
                // Scroll suave até o resultado em dispositivos móveis
                if (window.innerWidth < 768) {
                    setTimeout(() => {
                        resultado.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 100);
                }
            } else {
                resultado.classList.remove('show');
            }
        }

        // Previne zoom duplo no iOS
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
